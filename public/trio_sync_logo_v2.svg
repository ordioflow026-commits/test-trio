<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Global Vertical Gradient to match the image exactly -->
    <linearGradient id="trioGradient" x1="0" y1="80" x2="0" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#007BFF" />
    </linearGradient>
  </defs>

  <!-- Thin background ring -->
  <circle cx="256" cy="256" r="124" stroke="url(#trioGradient)" stroke-width="8" fill="none" />

  <!-- Orbital Symbol Group -->
  <g stroke="url(#trioGradient)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Top Rectangle -->
    <rect x="206" y="106" width="100" height="174" rx="28" />
    
    <!-- Bottom Right Rectangle -->
    <rect x="206" y="106" width="100" height="174" rx="28" transform="rotate(120 256 256)" />
    
    <!-- Bottom Left Rectangle -->
    <rect x="206" y="106" width="100" height="174" rx="28" transform="rotate(240 256 256)" />
    
  </g>
</svg>
